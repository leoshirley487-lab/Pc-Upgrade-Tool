<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSU Calculator - PC Upgrade Picker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #0f172a, #1e293b);
}

/* BACKDROP */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' fill='none' stroke='%233b82f6' stroke-width='1.2' opacity='0.08'>\
<rect x='10' y='10' width='40' height='25' rx='3'/>\
<circle cx='25' cy='60' r='8'/>\
<rect x='70' y='20' width='30' height='20' rx='3'/>\
<path d='M70 70 h30 v15 h-30z'/>\
</svg>");
  background-size: 180px 180px;
  pointer-events: none;
}

/* NAV */
nav {
  background: #020617;
  padding: 14px;
  text-align: center;
}

nav a {
  color: #94a3b8;
  margin: 0 12px;
  text-decoration: none;
  font-weight: bold;
}

.wrapper {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;

  width: 100%;

}

input, button {
  width: 100%;

</style>
</head>

<body>

<nav>
  <a href="index.html">Upgrade Tool</a>
  <a href="bottleneck.html">Bottleneck</a>
  <a href="psu.html">PSU</a>
  <a href="builder.html">Builder</a>
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
</nav>

<div class="wrapper">
<div class="container">

<h1>PSU Calculator</h1>

<input id="cpu" placeholder="CPU (e.g. i5 10400, Ryzen 5 3600)">
<input id="gpu" placeholder="GPU (e.g. RTX 3060, RX 580)">
<input id="ram" placeholder="RAM (GB)">

<button onclick="calculate()">Calculate PSU</button>

<div id="output" style="margin-top:20px;"></div>

</div>
</div>

<script>

/* CPU WATTAGE */
function cpuWatts(v){
  v = (v||"").toLowerCase();

  const num = parseInt(v.match(/(\d{4,5})/)?.[1]);
  if(!num) return 65;

  let gen = Math.floor(num/1000);
  let tier = v.includes("i9")||v.includes("9")?4:
             v.includes("i7")||v.includes("7")?3:
             v.includes("i5")||v.includes("5")?2:1;

  return 50 + (tier*25) + (gen*3);
}

/* GPU WATTAGE */
function gpuWatts(v){
  v = (v||"").toLowerCase();

  const num = parseInt(v.match(/(\d{3,4})/)?.[1]);
  if(!num) return 150;

  let tier = v.includes("90")||v.includes("xtx")?4:
             v.includes("80")||v.includes("xt")?3:
             v.includes("70")?2:1;

  /* NVIDIA */
  if(v.includes("rtx")||v.includes("gtx")){
    return 120 + (tier*80) + (num/15);
  }

  /* AMD */
  if(v.includes("rx")){
    return 130 + (tier*85) + (num/18);
  }

  /* INTEL ARC */
  if(v.includes("arc")){
    if(v.includes("a770")) return 225;
    if(v.includes("a750")) return 200;
    return 180;
  }

  return 150;
}

/* RAM */
function ramWatts(r){
  const val = parseInt(r);
  if(!val) return 10;
  return 5 + (val/4);
}

/* MAIN */
function calculate(){

  const c = cpuWatts(cpu.value);
  const g = gpuWatts(gpu.value);
  const r = ramWatts(ram.value);

  const base = c + g + r + 50; // motherboard + extras

  const recommended = Math.ceil(base * 1.4 / 50) * 50;

  output.innerHTML =
    "<b>Estimated Usage:</b> " + Math.round(base) + "W<br><br>" +
    "<b>Recommended PSU:</b> " + recommended + "W<br><br>" +
    "Includes safety headroom for upgrades and efficiency.";
}

</script>

</body>
</html>
