
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Upgrade Picker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #0f172a, #1e293b);
}

/* BACKDROP */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' fill='none' stroke='%233b82f6' stroke-width='1.2' opacity='0.08'>\
<rect x='10' y='10' width='40' height='25' rx='3'/>\
<circle cx='25' cy='60' r='8'/>\
<rect x='70' y='20' width='30' height='20' rx='3'/>\
<path d='M70 70 h30 v15 h-30z'/>\
</svg>");
  background-size: 180px 180px;
  pointer-events: none;
}

/* NAV */
nav {
  background: #020617;
  padding: 14px;
  text-align: center;
}

nav a {
  color: #94a3b8;
  margin: 0 12px;
  text-decoration: none;
  font-weight: bold;
}

/* LAYOUT */
.wrapper {
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 520px;
  background: #1e293b;
  padding: 30px;
  border-radius: 16px;
}

/* INPUTS */
input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

input { background: #0f172a; color: white; }
button { background: #3b82f6; color: white; font-weight: bold; }

/* BAR */
.bar {
  height: 18px;
  background: #334155;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 5px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #3b82f6;
}
.suggestions {
  position: absolute;
  width: 100%;
  background: #0f172a;
  border-radius: 8px;
  margin-top: 4px;
  max-height: 150px;
  overflow-y: auto;
  z-index: 100;
}

.suggestions div {
  padding: 10px;
  cursor: pointer;
}

.suggestions div:hover {
  background: #1e293b;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="tool.html">Upgrade Tool</a>
  <a href="bottleneck.html">Bottleneck</a>
  <a href="psu.html">PSU</a>
  <a href="builder.html">Builder</a>
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
</nav>

<div class="wrapper">
<div class="container">

<h1>PC Upgrade Picker</h1>

<div style="position:relative;">
  <input id="cpu" oninput="suggestCPU()" placeholder="CPU">
  <div id="cpuList" class="suggestions"></div>
</div>

<div style="position:relative;">
  <input id="gpu" oninput="suggestGPU()" placeholder="GPU">
  <div id="gpuList" class="suggestions"></div>
</div>
<input id="ram" placeholder="RAM (GB)">
<input id="budget" placeholder="Budget £">

<button onclick="analyze()">Analyse</button>

<div style="margin-top:20px;">
  <div>Performance Before</div>
  <div class="bar"><div id="beforeBar" class="fill"></div></div>

  <div style="margin-top:10px;">Performance After</div>
  <div class="bar"><div id="afterBar" class="fill"></div></div>

  <div id="textOutput" style="margin-top:15px;"></div>
  <div id="pathOutput" style="margin-top:15px;"></div>
</div>

</div>
</div>

<script>

/* CPU */
function cpuScore(v){
  v = (v||"").toLowerCase();
  const num = parseInt(v.match(/(\d{4,5})/)?.[1]);
  if(!num) return null;

  let gen = Math.floor(num/1000);
  let tier = v.includes("i9")||v.includes("9")?4:
             v.includes("i7")||v.includes("7")?3:
             v.includes("i5")||v.includes("5")?2:1;

  return Math.min(100,(gen*7)+(tier*10));
}

/* GPU */
function gpuScore(v){
  v = (v||"").toLowerCase();
  const num = parseInt(v.match(/(\d{3,4})/)?.[1]);
  if(!num) return null;

  let tier = v.includes("90")||v.includes("xtx")?4:
             v.includes("80")||v.includes("xt")?3:
             v.includes("70")?2:1;

  return Math.min(100,(num/55)+(tier*12));
}

/* RAM */
function ramScore(r,c,g){
  const val = parseInt(r);
  if(!val) return null;

  const power = Math.max(c,g);

  if(power >= 85){
    if(val >= 32) return 95;
    if(val >= 16) return 70;
    return 30;
  }

  return val >= 16 ? 85 : 60;
}

/* AVG */
function avg(a,b,c){
  return Math.round((a+b+c)/3);
}

/* UPGRADE SIM */
function simulate(part,c,g,r){
  if(part==="CPU") return avg(95,g,r);
  if(part==="GPU") return avg(c,95,r);
  if(part==="RAM") return avg(c,g,90);
}

/* RECOMMEND */
function recommend(part,b){
  b = parseInt(b)||0;

  if(part==="RAM"){
    return b>=120?"32GB RAM":"16GB RAM";
  }

  if(part==="GPU"){
    if(b>=500) return "RTX 4070 / RX 7800 XT";
    if(b>=300) return "RTX 4060 / RX 7600";
    return "Entry GPU upgrade";
  }

  if(part==="CPU"){
    if(b>=300) return "Modern i5 / Ryzen 5";
    return "Newer CPU generation";
  }
}

/* UPGRADE PATH */
function upgradePath(c,g,r,b){

  let steps = [];

  let parts = [
    {n:"CPU",s:c},
    {n:"GPU",s:g},
    {n:"RAM",s:r}
  ];

  parts.sort((a,b)=>a.s-b.s);

  for(let i=0;i<3;i++){
    const p = parts[i].n;
    steps.push("Step " + (i+1) + ": Upgrade " + p + " → " + recommend(p,b));
  }

  return steps.join("<br>");
}

/* MAIN */
function analyze(){

  const c = cpuScore(cpu.value);
  const g = gpuScore(gpu.value);
  const r = ramScore(ram.value,c,g);

  if(!c || !g || !r){
    textOutput.innerHTML = "Not recognised";
    return;
  }

  const before = avg(c,g,r);

  const parts = [
    {n:"CPU",s:c},
    {n:"GPU",s:g},
    {n:"RAM",s:r}
  ];

  parts.sort((a,b)=>a.s-b.s);
  const weak = parts[0].n;

  const after = simulate(weak,c,g,r);

  beforeBar.style.width = before + "%";
  afterBar.style.width = after + "%";

  textOutput.innerHTML =
    "<b>Weakest Part:</b> " + weak +
    "<br><b>Upgrade:</b> " + recommend(weak,budget.value);

  pathOutput.innerHTML =
    "<br><b>Upgrade Path:</b><br>" +
    upgradePath(c,g,r,budget.value);
}
const cpus = [
  "i3 12100F","i5 12400F","i5 13400F","i5 14400F",
  "i7 12700K","i7 14700K","i9 14900K",
  "Ryzen 5 5600","Ryzen 5 7600","Ryzen 5 8600X",
  "Ryzen 7 7700","Ryzen 7 8700X","Ryzen 9 7950X"
];

const gpus = [
  "GTX 970","GTX 1060",
  "RTX 2060","RTX 3060","RTX 4060","RTX 5060",
  "RTX 5070","RTX 5080","RTX 5090",
  "RX 580","RX 6600","RX 7600","RX 8600",
  "RX 8800 XT","RX 8900 XTX"
];

function suggestCPU(){
  const input = document.getElementById("cpu").value.toLowerCase();
  const box = document.getElementById("cpuList");
  box.innerHTML = "";

  if(!input) return;

  cpus
    .filter(c => c.toLowerCase().includes(input))
    .slice(0,5)
    .forEach(c => {
      const div = document.createElement("div");
      div.innerText = c;
      div.onclick = () => {
        document.getElementById("cpu").value = c;
        box.innerHTML = "";
      };
      box.appendChild(div);
    });
}

function suggestGPU(){
  const input = document.getElementById("gpu").value.toLowerCase();
  const box = document.getElementById("gpuList");
  box.innerHTML = "";

  if(!input) return;

  gpus
    .filter(g => g.toLowerCase().includes(input))
    .slice(0,5)
    .forEach(g => {
      const div = document.createElement("div");
      div.innerText = g;
      div.onclick = () => {
        document.getElementById("gpu").value = g;
        box.innerHTML = "";
      };
      box.appendChild(div);
    });
}
  
</script>

</body>
</html>
