<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget PC Builder</title>

<style>

/* RESET */
* { box-sizing: border-box; }

/* BODY */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* BACKDROP */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' fill='none' stroke='%233b82f6' stroke-width='1.2' opacity='0.08'>\
<rect x='10' y='10' width='40' height='25' rx='3'/>\
<circle cx='25' cy='60' r='8'/>\
<rect x='70' y='20' width='30' height='20' rx='3'/>\
<path d='M70 70 h30 v15 h-30z'/>\
</svg>");
  background-size: 180px 180px;
  pointer-events: none;
}

/* NAV */
nav {
  height: 60px;
  background: #020617;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

nav a {
  color: #94a3b8;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: white;
}

/* CENTER */
.wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* BOX */
.container {
  width: 100%;
  max-width: 520px;
  background: #1e293b;
  padding: 30px;
  border-radius: 16px;
}

/* INPUT + BUTTON */
input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

input {
  background: #0f172a;
  color: white;
}

button {
  background: #3b82f6;
  color: white;
  font-weight: bold;
}

/* OUTPUT */
#output {
  margin-top: 15px;
  line-height: 1.5;
}

/* MOBILE */
@media (max-width: 600px){
  .container { padding: 20px; }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="tool.html">Upgrade Tool</a>
  <a href="bottleneck.html">Bottleneck</a>
  <a href="psu.html">PSU</a>
  <a href="builder.html">Builder</a>
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
</nav>

<div class="wrapper">
<div class="container">

<h1>Budget PC Builder</h1>

<input id="budget" placeholder="Enter Budget (£)">
<button onclick="build()">Generate Build</button>

<div id="output"></div>

</div>
</div>

<script>

function build(){

  const b = parseInt(budget.value);

  if(!b){
    output.innerHTML = "Enter a valid budget";
    return;
  }

  let cpu, gpu, ram, storage, psu, extra;

  /* ENTRY */
  if(b <= 600){
    cpu = "Ryzen 5 5500 / i3 12100F";
    gpu = "RTX 3060 / RX 6600";
    ram = "16GB DDR4";
    storage = "1TB SSD";
    psu = "550W PSU";
    extra = "Basic motherboard + budget case";
  }

  /* LOW-MID */
  else if(b <= 900){
    cpu = "Ryzen 5 5600 / i5 12400F";
    gpu = "RTX 4060 / RX 7600";
    ram = "16GB DDR4";
    storage = "1TB NVMe SSD";
    psu = "600W PSU";
    extra = "B550/B660 motherboard + airflow case";
  }

  /* MID (NEW GEN START) */
  else if(b <= 1300){
    cpu = "Ryzen 5 7600 / i5 13400F";
    gpu = "RTX 5060 / RX 8600 XT";
    ram = "32GB DDR5";
    storage = "1TB NVMe SSD";
    psu = "650W PSU";
    extra = "DDR5 platform + decent cooling";
  }

  /* UPPER MID */
  else if(b <= 1800){
    cpu = "Ryzen 7 7700 / i5 14600K";
    gpu = "RTX 5070 / RX 8800 XT";
    ram = "32GB DDR5";
    storage = "2TB NVMe SSD";
    psu = "750W PSU";
    extra = "High airflow case + strong cooling";
  }

  /* HIGH END */
  else if(b <= 2500){
    cpu = "Ryzen 7 7800X3D / i7 14700K";
    gpu = "RTX 5080 / RX 8900 XTX";
    ram = "32GB DDR5";
    storage = "2TB NVMe SSD";
    psu = "850W PSU";
    extra = "Premium motherboard + AIO cooling";
  }

  /* ENTHUSIAST */
  else{
    cpu = "Ryzen 9 7950X3D / i9 14900K";
    gpu = "RTX 5090";
    ram = "64GB DDR5";
    storage = "2TB–4TB NVMe SSD";
    psu = "1000W PSU";
    extra = "Top-tier components + premium cooling";
  }

  output.innerHTML =
    "<b>Recommended Build:</b><br><br>" +
    "CPU: " + cpu + "<br>" +
    "GPU: " + gpu + "<br>" +
    "RAM: " + ram + "<br>" +
    "Storage: " + storage + "<br>" +
    "PSU: " + psu + "<br>" +
    "Other: " + extra +
    "<br><br><i>Prices are estimated and may slightly exceed budget.</i>";
}

</script>

</body>
</html>
